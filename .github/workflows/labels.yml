name: Sync labels

# Keeps GitHub's actual label list in sync with .github/labels.yml so
# the two of you (and any agent reading the issue templates) are always
# looking at the same taxonomy — no manual label creation in the UI.

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
  workflow_dispatch: {}

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: false
